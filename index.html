<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NetCRM">
<title>NetCRM — MSF Networking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --surface3: #22222f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #555568;
  --accent: #6c63ff;
  --accent2: #8b83ff;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.1);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.1);
  --coral: #f97316;
  --coral-bg: rgba(249,115,22,0.1);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.1);
  --pink: #ec4899;
  --pink-bg: rgba(236,72,153,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.app { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
@media (max-width: 768px) { .sidebar { width: 60px; } .logo-sub, .nav-label, .sidebar-stat-label { display: none; } .logo-title { font-size: 14px; } .nav-item { justify-content: center; padding: 12px; } }
.logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); }
.logo-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.nav { padding: 16px 0; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; border-left: 2px solid transparent; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent2); background: rgba(108,99,255,0.08); border-left-color: var(--accent); }
.nav-icon { font-size: 16px; width: 18px; text-align: center; flex-shrink: 0; }
.sidebar-stats { padding: 16px 20px; border-top: 1px solid var(--border); }
.sidebar-stat { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
.sidebar-stat-label { font-size: 11px; color: var(--text3); }
.sidebar-stat-val { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; }
.sidebar-stat-val.green { color: var(--green); }
.sidebar-stat-val.accent { color: var(--accent2); }
.sidebar-stat-val.amber { color: var(--amber); }

/* Main */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.topbar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); flex-shrink: 0; }
.page-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
.btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); background: var(--surface3); }
.content { flex: 1; overflow-y: auto; padding: 24px; }
@media (max-width: 768px) { .content { padding: 16px; } .topbar { padding: 12px 16px; } }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
@media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.stat-val { font-size: 28px; font-weight: 700; font-family: 'DM Mono', monospace; }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }
.stat-val.green { color: var(--green); }
.stat-val.accent { color: var(--accent2); }
.stat-val.amber { color: var(--amber); }
.stat-val.coral { color: var(--coral); }

/* Filters */
.filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border2); color: var(--text2); background: transparent; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.filter-chip:hover { color: var(--text); }
.filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Contact cards */
.contact-grid { display: flex; flex-direction: column; gap: 10px; }
.contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
.contact-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.contact-card.tier1::before { background: var(--blue); }
.contact-card.tier2::before { background: var(--green); }
.contact-card.tier3::before { background: var(--text3); }
.contact-card.peer::before { background: var(--amber); }
.contact-card.ambassador::before { background: var(--pink); }
.contact-card.ambassador-ib::before { background: var(--coral); }
.contact-card.family::before { background: var(--accent); }
.contact-card:hover { border-color: var(--border2); background: var(--surface2); }
.card-header { display: flex; align-items: flex-start; gap: 12px; }
.avatar { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-name { font-size: 14px; font-weight: 600; }
.card-role { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-why { font-size: 11px; color: var(--text3); margin-top: 4px; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
.tag-blue { background: var(--blue-bg); color: #93c5fd; }
.tag-green { background: var(--green-bg); color: #86efac; }
.tag-amber { background: var(--amber-bg); color: #fcd34d; }
.tag-coral { background: var(--coral-bg); color: #fdba74; }
.tag-pink { background: var(--pink-bg); color: #f9a8d4; }
.tag-accent { background: rgba(108,99,255,0.15); color: var(--accent2); }

/* Pipeline */
.pipeline { display: flex; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.pip-step { display: flex; flex-direction: column; align-items: center; flex: 1; }
.pip-dot { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 9px; cursor: pointer; transition: all 0.15s; user-select: none; }
.pip-dot:hover { border-color: var(--accent2); }
.pip-dot.done { background: var(--green); border-color: var(--green); color: white; }
.pip-dot.current { background: var(--accent); border-color: var(--accent); color: white; }
.pip-line { flex: 1; height: 1px; background: var(--border); margin-bottom: 16px; transition: background 0.2s; }
.pip-line.done { background: var(--green); }
.pip-line.current { background: var(--accent); }
.pip-label { font-size: 9px; color: var(--text3); margin-top: 3px; text-align: center; line-height: 1.3; max-width: 52px; }
.pip-label.done { color: var(--green); }
.pip-label.current { color: var(--accent2); }

/* Detail panel */
.detail-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 420px; background: var(--surface); border-left: 1px solid var(--border); z-index: 200; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; box-shadow: -20px 0 60px rgba(0,0,0,0.5); }
@media (max-width: 768px) { .detail-panel { width: 100%; } }
.detail-panel.open { transform: translateX(0); }
.panel-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0; }
.panel-close { width: 28px; height: 28px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text2); margin-left: auto; flex-shrink: 0; }
.panel-body { flex: 1; overflow-y: auto; padding: 20px; }
.panel-section { margin-bottom: 20px; }
.panel-section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.msg-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 12px; line-height: 1.7; color: var(--text2); white-space: pre-wrap; word-break: break-word; }
.copy-btn { font-size: 11px; color: var(--accent2); cursor: pointer; background: none; border: none; margin-top: 6px; font-family: 'DM Sans', sans-serif; padding: 0; }
.copy-btn:hover { color: var(--accent); }
.notes-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; resize: vertical; min-height: 80px; outline: none; line-height: 1.6; }
.notes-input:focus { border-color: var(--accent); }
.step-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.step-btn { padding: 4px 10px; font-size: 11px; }

/* Calendar */
.calendar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 768px) { .calendar-grid { grid-template-columns: 1fr; } }
.cal-day { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.cal-day-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
.cal-day-name { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.cal-event { border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; border-left: 3px solid; }
.cal-event.call { background: var(--green-bg); border-left-color: var(--green); }
.cal-event.followup { background: var(--amber-bg); border-left-color: var(--amber); }
.cal-event.reminder { background: var(--coral-bg); border-left-color: var(--coral); }
.cal-event-title { font-size: 12px; font-weight: 500; }
.cal-event-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* AI */
.ai-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.ai-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.ai-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
.textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; resize: vertical; min-height: 120px; outline: none; line-height: 1.6; }
.textarea:focus { border-color: var(--accent); }
.ai-result { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 13px; line-height: 1.7; color: var(--text); margin-top: 12px; white-space: pre-wrap; word-break: break-word; }
.dot-pulse { display: flex; gap: 4px; align-items: center; }
.dot-pulse span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
.dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
.dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { opacity:0.3; transform:scale(0.8); } 40% { opacity:1; transform:scale(1); } }

/* API key input */
.api-banner { background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: var(--accent2); line-height: 1.6; }
.api-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--text); font-family: 'DM Mono', monospace; outline: none; margin-top: 8px; }
.api-input:focus { border-color: var(--accent); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-title">NetCRM</div>
      <div class="logo-sub">MSF // Jisha Goyal</div>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="showView('tracker')" id="nav-tracker"><span class="nav-icon">◎</span><span class="nav-label">Tracker</span></div>
      <div class="nav-item" onclick="showView('calendar')" id="nav-calendar"><span class="nav-icon">◷</span><span class="nav-label">Calendar</span></div>

  <div class="main">

    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

const DEFAULT_STEPS = {1:2,2:2,3:2,4:2,5:3,6:2,7:1,8:1,9:1,10:1,11:1,12:1,13:1,14:3,15:1,16:3,17:1,18:3,19:1,20:1,21:2,22:3};
const DEFAULT_NOTES = {5:'Confirmed call Wednesday after 2pm Central. PREP: restructuring questions, referral ask.',14:'Available Thu or Fri this week. Confirming time. He is in Austin CST, I am in GST.',18:'Confirmed call next week. Follow up Monday to schedule.',16:'Reach out Monday to schedule. He said he will know his schedule then.',22:'Responded positively. Follow up Monday to schedule.'};

function loadState() {
  try {
    const s = localStorage.getItem('netcrm_steps');
    const n = localStorage.getItem('netcrm_notes');
    const k = localStorage.getItem('netcrm_apikey');
    return {
      steps: s ? JSON.parse(s) : {...DEFAULT_STEPS},
      notes: n ? JSON.parse(n) : {...DEFAULT_NOTES},
      apiKey: k || ''
    };
  } catch(e) { return { steps:{...DEFAULT_STEPS}, notes:{...DEFAULT_NOTES}, apiKey:'' }; }
}

function saveState() {
  try {
    localStorage.setItem('netcrm_steps', JSON.stringify(stepMap));
    localStorage.setItem('netcrm_notes', JSON.stringify(notesMap));
    if(apiKey) localStorage.setItem('netcrm_apikey', apiKey);
  } catch(e) {}
}

const state = loadState();
let stepMap = state.steps;
let notesMap = state.notes;
let apiKey = state.apiKey;
let currentView = 'tracker';
let currentFilter = 'all';
let openPanelId = null;

const CALENDAR = [
  { day:'Today', date:'Wed May 27', events:[
    {type:'call', title:'Call: Michael Cox', sub:'Seabury — after 2pm Central (10pm GST)', time:'10:00 PM GST'},

function render() {
  updateSidebar();
  if(currentView==='tracker') renderTracker();
  else if(currentView==='calendar') renderCalendar();
  else renderAI();
}

function updateSidebar() {
  const inv = CONTACTS.filter(c=>stepMap[c.id]>=1).length;
  const res = CONTACTS.filter(c=>stepMap[c.id]>=3).length;
  const calls = CONTACTS.filter(c=>stepMap[c.id]>=4).length;
  document.getElementById('sidebar-stats').innerHTML = `
    <div class="sidebar-stat"><span class="sidebar-stat-label">Total</span><span class="sidebar-stat-val accent">${CONTACTS.length}</span></div>
    <div class="sidebar-stat"><span class="sidebar-stat-label">In progress</span><span class="sidebar-stat-val">${inv}</span></div>
    <div class="sidebar-stat"><span class="sidebar-stat-label">Responded</span><span class="sidebar-stat-val amber">${res}</span></div>
    <div class="sidebar-stat"><span class="sidebar-stat-label">Calls set</span><span class="sidebar-stat-val green">${calls}</span></div>
  `;
}

function showView(v) {
  currentView = v;
  ['tracker','calendar','ai'].forEach(x=>document.getElementById('nav-'+x).classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  document.getElementById('page-title').textContent = {tracker:'Tracker',calendar:'Calendar',ai:'AI Reply'}[v];
  closePanel();
  render();
}

function getFiltered() {
  const f = currentFilter;
  if(f==='tier1') return CONTACTS.filter(c=>c.tier==='tier1');
  if(f==='tier2') return CONTACTS.filter(c=>c.tier==='tier2');
  if(f==='tier3') return CONTACTS.filter(c=>c.tier==='tier3');
  if(f==='peer') return CONTACTS.filter(c=>c.tier==='peer'||c.tier==='family');
  if(f==='ambassador') return CONTACTS.filter(c=>c.tier.includes('ambassador'));
  if(f==='responded') return CONTACTS.filter(c=>stepMap[c.id]>=3);
  if(f==='calls') return CONTACTS.filter(c=>stepMap[c.id]>=4);
  return CONTACTS;
}

function renderTracker() {
  const filtered = getFiltered();
  const chips = [
    {k:'all',l:'All'},{k:'tier1',l:'Tier 1'},{k:'tier2',l:'Tier 2'},{k:'tier3',l:'Tier 3'},
    {k:'peer',l:'Peers'},{k:'ambassador',l:'Ambassadors'},{k:'responded',l:'Responded'},{k:'calls',l:'Calls set'}
  ];
  document.getElementById('content').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val accent">${filtered.length}</div><div class="stat-label">Contacts</div></div>
      <div class="stat-card"><div class="stat-val">${filtered.filter(c=>stepMap[c.id]>=1).length}</div><div class="stat-label">Invited</div></div>
      <div class="stat-card"><div class="stat-val amber">${filtered.filter(c=>stepMap[c.id]>=3).length}</div><div class="stat-label">Responded</div></div>
      <div class="stat-card"><div class="stat-val green">${filtered.filter(c=>stepMap[c.id]>=4).length}</div><div class="stat-label">Calls set</div></div>
    </div>
    <div class="filters">${chips.map(f=>`<button class="filter-chip ${currentFilter===f.k?'active':''}" onclick="setFilter('${f.k}')">${f.l}</button>`).join('')}</div>
    <div class="contact-grid">${filtered.map(renderCard).join('')}</div>
  `;
}

const TAG_COLORS = {banking:'tag-blue',investing:'tag-green',peer:'tag-amber','ambassador-ib':'tag-coral',ambassador:'tag-pink',family:'tag-accent',consulting:'tag-accent'};

function renderCard(c) {
  const step = stepMap[c.id];
  const tags = c.tags.map(t=>`<span class="tag ${TAG_COLORS[t]||'tag-accent'}">${t}</span>`).join('');
  const responded = step>=3 ? '<span class="tag tag-green">responded</span>' : '';
  const pip = STEPS.map((label,i)=>{
    const done=step>i, cur=step===i;
    return `<div class="pip-step"><div class="pip-dot ${done?'done':cur?'current':''}" onclick="event.stopPropagation();advance(${c.id},${done?-1:1})" title="${label}">✓</div><div class="pip-label ${done?'done':cur?'current':''}">${label}</div></div>${i<STEPS.length-1?`<div class="pip-line ${step>i?'done':step===i?'current':''}"></div>`:''}`;
  }).join('');
  return `<div class="contact-card ${c.tier}" onclick="openPanel(${c.id})">
    <div class="card-header">
      <div class="avatar" style="background:${c.av}">${c.initials}</div>
      <div class="card-info">
        <div class="card-name-row"><span class="card-name">${c.name}</span>${tags}${responded}</div>
        <div class="card-role">${c.role}</div>
        <div class="card-why">${c.why}</div>
      </div>
    </div>
    <div class="pipeline">${pip}</div>
  </div>`;
}

function advance(id, dir) {
  stepMap[id] = Math.max(0,Math.min(5,stepMap[id]+dir));
  saveState();
  render();
  if(openPanelId===id) openPanel(id);
}

function setFilter(f) { currentFilter=f; renderTracker(); }

function openPanel(id) {
  openPanelId = id;
  const c = CONTACTS.find(x=>x.id===id);
  const step = stepMap[id];
  document.getElementById('panel-name').textContent = c.name;
  document.getElementById('panel-role').textContent = c.role;
  const stepBtns = STEPS.map((s,i)=>`<button class="btn step-btn ${step===i?'btn-primary':'btn-ghost'}" onclick="advance(${id},${step>i?-(step-i):i-step})">${s}</button>`).join('');
  document.getElementById('panel-body').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Pipeline status</div>
      <div class="step-btns">${stepBtns}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Why they matter</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;">${c.why}</div>
    </div>
    ${c.note?`<div class="panel-section"><div class="panel-section-title">Connection note (300 char)</div><div class="msg-box">${c.note}</div><button class="copy-btn" onclick="cp(${id},'note')">Copy note</button></div>`:''}
    <div class="panel-section">
      <div class="panel-section-title">Follow-up message</div>
      <div class="msg-box">${c.message}</div>
      <button class="copy-btn" onclick="cp(${id},'msg')">Copy message</button>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Your notes</div>
      <textarea class="notes-input" placeholder="Notes about this contact, call prep, what they said..." oninput="saveNote(${id},this.value)">${notesMap[id]||''}</textarea>
    </div>
  `;
  document.getElementById('detail-panel').classList.add('open');
}

function cp(id, type) {
  const c = CONTACTS.find(x=>x.id===id);
  navigator.clipboard.writeText(type==='note'?c.note:c.message).catch(()=>{});
}
function saveNote(id, val) { notesMap[id]=val; saveState(); }
function closePanel() { document.getElementById('detail-panel').classList.remove('open'); openPanelId=null; }

function renderCalendar() {
  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:20px;font-size:13px;color:var(--text2);">Confirmed calls and reminders. Green = call, amber = follow-up, coral = reminder.</div>
    <div class="calendar-grid">
      ${CALENDAR.map(d=>`<div class="cal-day">
        <div class="cal-day-label">${d.date}</div>
        <div class="cal-day-name">${d.day}</div>
        ${d.events.map(e=>`<div class="cal-event ${e.type}">
          <div class="cal-event-title">${e.title}</div>
          <div class="cal-event-sub">${e.sub}${e.time?' · '+e.time:''}</div>
        </div>`).join('')}
      </div>`).join('')}
    </div>
    <div style="margin-top:16px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-size:12px;color:var(--text2);line-height:1.7;">
      <strong style="color:var(--text);">Michael Cox call prep</strong> — Open with "I know you're busy so I'll be mindful of the 20 minutes." Ask about his path from Continental Airlines to restructuring advisory, what matters most for MSF students targeting restructuring, and end with "Is there anyone else you'd recommend I speak with?" No em dashes. Keep it conversational.
    </div>
  `;
}

function renderAI() {
  document.getElementById('content').innerHTML = `
    <div class="api-banner">
      To use AI features outside of Claude.ai, you need an Anthropic API key. Get one free at <strong>console.anthropic.com</strong> then paste it below. It's saved locally in your browser only.
      <input class="api-input" type="password" placeholder="sk-ant-..." value="${apiKey}" oninput="apiKey=this.value;saveState()" />
    </div>
    <div class="ai-section">
      <div class="ai-title">Reply suggester</div>
      <div class="ai-sub">Paste a LinkedIn conversation. Get the ideal next reply, following your rules: no em dashes, warm but professional, always moves toward a clear next step.</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">Conversation:</div>
      <textarea class="textarea" id="convo-in" placeholder="Paste the full conversation here..."></textarea>
      <div style="font-size:12px;color:var(--text2);margin:8px 0 6px;">Context (optional):</div>
      <textarea class="textarea" id="ctx-in" placeholder="e.g. Michael Cox, restructuring IB, confirmed call Wednesday, I want to confirm the time..." style="min-height:60px;"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-primary" onclick="getReply()">Suggest reply</button>
        <button class="btn btn-ghost" onclick="document.getElementById('convo-in').value='';document.getElementById('reply-out').style.display='none'">Clear</button>
      </div>
      <div id="reply-out" style="display:none;margin-top:12px;">
        <div class="panel-section-title" style="margin-bottom:8px;">Suggested reply</div>
        <div class="ai-result" id="reply-text"></div>
        <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('reply-text').textContent)" style="margin-top:8px;">Copy reply</button>
      </div>
    </div>
    <div class="ai-section">
      <div class="ai-title">Message generator</div>
      <div class="ai-sub">Paste someone's LinkedIn headline or bio. Get a personalised outreach message from Jisha.</div>
      <textarea class="textarea" id="gen-in" placeholder="e.g. VP at Goldman Sachs, previously McCombs MSF 2019, energy IB..."></textarea>
      <button class="btn btn-primary" style="margin-top:12px;" onclick="genMessage()">Generate message</button>
      <div id="gen-out" style="display:none;margin-top:12px;">
        <div class="panel-section-title" style="margin-bottom:8px;">Generated message</div>
        <div class="ai-result" id="gen-text"></div>
        <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('gen-text').textContent)" style="margin-top:8px;">Copy message</button>
      </div>
    </div>
  `;
}

async function callClaude(prompt) {
  if(!apiKey) return 'Please enter your Anthropic API key above to use AI features.';
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})
  });
  const d = await res.json();
  return d.content?.map(x=>x.text||'').join('')||'Error generating response.';
}

async function getReply() {
  const convo = document.getElementById('convo-in').value.trim();
  const ctx = document.getElementById('ctx-in').value.trim();
  if(!convo) return;
  const out = document.getElementById('reply-out');
  const txt = document.getElementById('reply-text');
  out.style.display='block';
  txt.innerHTML='<div class="dot-pulse"><span></span><span></span><span></span></div>';
  const prompt = `You are helping Jisha Goyal, incoming MSF student at UT Austin McCombs, write a LinkedIn reply. She is an international student from Dubai targeting investment banking.

Rules: no em dashes, short and natural, warm but professional, always move toward a clear next step, never overclaim.

${ctx?'Context: '+ctx:''}

Conversation:
${convo}

Write only Jisha's next reply. Nothing else.`;
  txt.textContent = await callClaude(prompt);
}

async function genMessage() {
  const bio = document.getElementById('gen-in').value.trim();
  if(!bio) return;
  const out = document.getElementById('gen-out');
  const txt = document.getElementById('gen-text');
  out.style.display='block';
  txt.innerHTML='<div class="dot-pulse"><span></span><span></span><span></span></div>';
  const prompt = `Write a LinkedIn outreach message from Jisha Goyal, incoming MSF student at UT Austin McCombs, to this contact: ${bio}

Rules: no em dashes, start with "I am an incoming MSF student at McCombs", be specific to their role, ask for a 20-minute call, under 200 words, warm and natural. Write only the message.`;
  txt.textContent = await callClaude(prompt);
}

function exportCSV() {
  const rows = CONTACTS.map(c=>`"${c.name}","${c.role}","${STEPS[stepMap[c.id]]}","${(notesMap[c.id]||'').replace(/"/g,"'")}"`);
  const csv = 'Name,Role,Status,Notes\n'+rows.join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'msf_networking.csv';
  a.click();
}

render();
